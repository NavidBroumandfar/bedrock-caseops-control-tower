<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#13192b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF9900" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#FF9900" stop-opacity="1"/>
      <stop offset="85%"  stop-color="#FF9900" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF9900" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accent)"/>

  <!-- Title -->
  <text x="450" y="52"
    font-family="Helvetica,Arial,sans-serif"
    font-size="24" font-weight="bold" fill="#f0f6fc" text-anchor="middle">
    Bedrock CaseOps Control Tower
  </text>

  <!-- Subtitle -->
  <text x="450" y="76"
    font-family="Helvetica,Arial,sans-serif"
    font-size="13" fill="#6b7fa3" text-anchor="middle">
    AWS-native downstream retrieval, reasoning, validation, and escalation layer
  </text>

  <!-- Supervisor label -->
  <text x="382" y="100"
    font-family="Helvetica,Arial,sans-serif"
    font-size="9" fill="#374151" text-anchor="middle">
    SUPERVISOR ORCHESTRATION
  </text>

  <!-- Node 1: Retrieval Agent -->
  <rect x="146" y="108" width="100" height="32" rx="4" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
  <text x="196" y="128"
    font-family="Helvetica,Arial,sans-serif"
    font-size="10" fill="#60a5fa" text-anchor="middle" font-weight="bold">Retrieval Agent</text>

  <!-- Arrow 1 -->
  <line x1="246" y1="124" x2="263" y2="124" stroke="#374151" stroke-width="1.2"/>
  <polygon points="263,120 263,128 270,124" fill="#374151"/>

  <!-- Node 2: Analysis Agent -->
  <rect x="270" y="108" width="100" height="32" rx="4" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
  <text x="320" y="128"
    font-family="Helvetica,Arial,sans-serif"
    font-size="10" fill="#60a5fa" text-anchor="middle" font-weight="bold">Analysis Agent</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="124" x2="387" y2="124" stroke="#374151" stroke-width="1.2"/>
  <polygon points="387,120 387,128 394,124" fill="#374151"/>

  <!-- Node 3: Validation Agent -->
  <rect x="394" y="108" width="100" height="32" rx="4" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
  <text x="444" y="128"
    font-family="Helvetica,Arial,sans-serif"
    font-size="10" fill="#60a5fa" text-anchor="middle" font-weight="bold">Validation Agent</text>

  <!-- Arrow 3 -->
  <line x1="494" y1="124" x2="511" y2="124" stroke="#374151" stroke-width="1.2"/>
  <polygon points="511,120 511,128 518,124" fill="#374151"/>

  <!-- Node 4: Tool Executor -->
  <rect x="518" y="108" width="100" height="32" rx="4" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
  <text x="568" y="128"
    font-family="Helvetica,Arial,sans-serif"
    font-size="10" fill="#60a5fa" text-anchor="middle" font-weight="bold">Tool Executor</text>

  <!-- Arrow 4 -->
  <line x1="618" y1="124" x2="635" y2="124" stroke="#374151" stroke-width="1.2"/>
  <polygon points="635,120 635,128 642,124" fill="#374151"/>

  <!-- Node 5: Structured Output -->
  <rect x="642" y="108" width="112" height="32" rx="4" fill="#1a2232" stroke="#FF9900" stroke-width="1.3" stroke-opacity="0.85"/>
  <text x="698" y="128"
    font-family="Helvetica,Arial,sans-serif"
    font-size="10" fill="#FF9900" text-anchor="middle" font-weight="bold">Structured Output</text>

  <!-- Tech stack footer -->
  <text x="450" y="170"
    font-family="Helvetica,Arial,sans-serif"
    font-size="10" fill="#374151" text-anchor="middle">
    Amazon Bedrock | Knowledge Bases | S3 | Lambda | CloudWatch | Claude via Converse API
  </text>
</svg>
